[pytest]
minversion = 7.0
testpaths =
    muse
    docs
norecursedirs =
    .tox
    build
    docs/_build
    docs/generated
    *.egg-info
    examples
    muse/_dev
    .history
    muse/extern
doctest_plus = enabled
doctest_optionflags =
    NORMALIZE_WHITESPACE
    FLOAT_CMP
    ELLIPSIS
text_file_format = rst
addopts =
    --doctest-rst
    -p no:unraisableexception
    -p no:threadexception
    -m "not mpl_image_compare and not cuda"
mpl-results-path = figure_test_images
mpl-use-full-test-name = true
markers =
    remote_data: marks this test function as needing remote data.
    online: marks this test function as needing online connectivity.
    cuda: marks this test function as requiring a CUDA GPU. Deselected by default; opt in (and supply a GPU) with `pytest -m cuda`.
    mpl_image_compare: marks this test function as using hash-based Matplotlib figure verification. This mark is not meant to be directly applied, but is instead automatically applied when a test function uses the @muse.tests.helpers.figure_test decorator.
remote_data_strict = true
filterwarnings =
    # Turn all warnings into errors so they do not pass silently.
    error
    # Do not fail on pytest config issues (i.e. missing plugins) but do show them
    always::pytest.PytestConfigWarning
    # A list of warnings to ignore follows. If you add to this list, you MUST
    # add a comment or ideally a link to an issue that explains why the warning
    # is being ignored
    # https://github.com/pytest-dev/pytest-cov/issues/557
    # It was fixed and released but it does not seem to be fixed
    ignore:The --rsyncdir command line argument and rsyncdirs config variable are deprecated.:DeprecationWarning
    # dateutil/tz/tz.py:37
    ignore:.*utcfromtimestamp.*:DeprecationWarning
    # ../../.tox/py313/lib/python3.13/site-packages/torch/utils/mkldnn.py:19: in MkldnnLinear
    ignore:`torch.jit.script_method` is deprecated. Please switch to `torch.compile` or `torch.export`:DeprecationWarning
