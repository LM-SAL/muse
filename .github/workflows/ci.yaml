# Main CI Workflow
name: CI

on:
  push:
    branches:
      - 'main'
      - '*.*'
      - '!*backport*'
    tags:
      - 'v*'
      - '!*dev*'
      - '!*pre*'
      - '!*post*'
  pull_request:
  # Allow manual runs through the web UI
  workflow_dispatch:
  schedule:
    #        ┌───────── minute (0 - 59)
    #        │ ┌───────── hour (0 - 23)
    #        │ │ ┌───────── day of the month (1 - 31)
    #        │ │ │ ┌───────── month (1 - 12 or JAN-DEC)
    #        │ │ │ │ ┌───────── day of the week (0 - 6 or SUN-SAT)
    - cron: '0 7 * * 3'  # Every Wed at 07:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  core:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e5af21e4ae37af089a73bb032e10b78b0e746174  # v3.0.1
    with:
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      envs: |
        - linux: py313
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  chianti:
    name: CHIANTI line-list integration test
    if: github.ref_type != 'tag'
    runs-on: ubuntu-latest
    env:
      XUVTOP: ${{ github.workspace }}/.chianti/CHIANTI_11.0.2_database
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
      - name: Restore CHIANTI 11.0.2 database
        id: cache-chianti
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .chianti/CHIANTI_11.0.2_database
          key: chianti-database-${{ runner.os }}-11.0.2
      - name: Download CHIANTI 11.0.2 database
        if: steps.cache-chianti.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${XUVTOP}"
          curl --fail --location --retry 3 \
            --output "${RUNNER_TEMP}/CHIANTI_11.0.2_database.tar.gz" \
            https://download.chiantidatabase.org/CHIANTI_11.0.2_database.tar.gz
          tar --extract --gzip \
            --file "${RUNNER_TEMP}/CHIANTI_11.0.2_database.tar.gz" \
            --directory "${XUVTOP}"
          test -f "${XUVTOP}/ip/chianti.ip"
      - name: Install line-list test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable '.[chianti]' \
            pytest pytest-doctestplus pytest-loguru pytest-mpl pytest-remotedata
      - name: Test live CHIANTI line-list generation
        run: python -m pytest muse/instrument/tests/test_linelist.py::test_create_chianti_line_list_live --remote-data=any -q
      - name: Save CHIANTI 11.0.2 database
        if: |
          steps.cache-chianti.outputs.cache-hit != 'true' &&
          (github.ref == 'refs/heads/main' ||
           github.event_name == 'schedule' ||
           github.event_name == 'workflow_dispatch')
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .chianti/CHIANTI_11.0.2_database
          key: ${{ steps.cache-chianti.outputs.cache-primary-key }}

  sdist_verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.13'
      - run: python -m pip install -U --user build
      - run: python -m build . --sdist
      - run: python -m pip install -U --user twine
      - run: python -m twine check dist/*

  test:
    needs: [core, sdist_verify]
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e5af21e4ae37af089a73bb032e10b78b0e746174  # v3.0.1
    with:
      submodules: false
      coverage: codecov
      toxdeps: tox-pypi-filter
      envs: |
        - linux: py314
        - windows: py312
        - macos: py312
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  docs:
    needs: [core]
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@e5af21e4ae37af089a73bb032e10b78b0e746174  # v3.0.1
    with:
      default_python: '3.13'
      submodules: false
      pytest: false
      toxdeps: tox-pypi-filter
      libraries: |
        apt:
          - graphviz
      envs: |
        - linux: build_docs

  build_dists:
    # Build wheels on PRs only when labelled. Releases will only be published if tagged ^v.*
    # see https://github-actions-workflows.openastronomy.org/en/latest/publish.html#upload-to-pypi
    if: |
      github.event_name != 'pull_request' ||
      (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'Run publish')
      )
    needs: [test, docs]
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/publish_pure_python.yml@e5af21e4ae37af089a73bb032e10b78b0e746174 # v3.0.1
    with:
      python-version: '3.13'
      test_extras: 'all,tests'
      test_command: 'pytest -p no:warnings --doctest-rst --pyargs muse -m "not mpl_image_compare and not cuda"'
      submodules: false
      save_artifacts: true
      upload_to_pypi: false

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: [build_dists]
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          pattern: dist-*
          path: dist
      - run: ls -lha dist/
      - name: Run upload
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
